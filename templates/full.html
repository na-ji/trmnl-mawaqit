{{ define "full.html" }}
<div class="layout layout--col gap">

  <div class="grid grid--cols-2 portrait:grid--cols-1 gap">
    {{ range .Prayers }}
    <div class="item {{ if .IsNext }} bg--black rounded{{ end }} p--2">
      <div class="meta"></div>
      <div class="content">
        <span class="value value--xlarge lg:value--xxxlarge portrait:value--large lg:portrait:value--xxlarge value--tnums{{ if .IsNext }} label--inverted{{ end }}">{{ .Time }}</span>
        <span class="label label--medium lg:label--large{{ if .IsNext }} label--inverted{{ end }}">{{ .Name }}</span>
      </div>
    </div>
    {{ end }}
  </div>

</div>

<div class="title_bar">
  <img class="image" src="https://usetrmnl.com/images/plugins/trmnl--render.svg">
  <span class="title">{{ .MosqueName }}</span>
  <span class="instance">Jumua : {{ .Jumua }}{{ if .Jumua2 }} · {{ .Jumua2 }}{{ end }}{{ if .Jumua3 }} · {{ .Jumua3 }}{{ end }}</span>
</div>
{{ end }}

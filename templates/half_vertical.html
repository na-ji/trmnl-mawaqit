{{ define "half_vertical.html" }}
<div class="layout layout--col gap">

  <div class="grid grid--cols-2 lg:grid--cols-1 gap">
    {{ range .Prayers }}
    <div class="item portrait:col--span-1{{ if .IsNext }} bg--black rounded label--inverted{{ end }} p--2">
      <div class="meta"></div>
      <div class="content">
        <span class="value value--base lg:value--large value--tnums">{{ .Time }}</span>
        <span class="label lg:label--medium{{ if .IsNext }} label--inverted{{ end }}">{{ .Name }}</span>
      </div>
    </div>
    {{ end }}
  </div>

</div>

<div class="title_bar">
  <img class="image" src="https://usetrmnl.com/images/plugins/trmnl--render.svg">
  <span class="title">{{ .MosqueName }}</span>
  <span class="instance">Jumua : {{ .Jumua }}{{ if .Jumua2 }} · {{ .Jumua2 }}{{ end }}{{ if .Jumua3 }} · {{ .Jumua3 }}{{ end }}</span>
</div>
{{ end }}
